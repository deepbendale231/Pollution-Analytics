name: API Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi \
            uvicorn \
            pydantic \
            pandas \
            numpy \
            scikit-learn \
            shap \
            prophet \
            streamlit \
            python-dotenv \
            joblib \
            pytest \
            httpx

      - name: Run API tests
        run: pytest tests/test_api.py -q
